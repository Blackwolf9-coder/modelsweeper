name: Feature request
description: Suggest a product or developer experience improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Great ideas are welcome. Keep this scoped and concrete.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a user, I want ... because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen.
      placeholder: Add a new screen/action/setting that ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you considered.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope / impact
      description: Who benefits? Any tradeoffs?
    validations:
      required: false
