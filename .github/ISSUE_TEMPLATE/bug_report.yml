name: Bug report
description: Report a reproducible problem in ModelSweeper
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in the details so we can reproduce quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: A short and clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps from a clean app state.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened.
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: e.g. v0.1.0
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: e.g. macOS 15.7.4
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, stack traces, or screenshots if available.
      render: shell
    validations:
      required: false
